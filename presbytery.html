<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPFOY Dashboard</title>
    <link rel="icon" type="image/png" href="img/upfoy-logo.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">


    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">
    <header class="header justify-content-sm-between text-white p-2 rounded" style="background-color: #1e3a8a">
        <a class=" h2 navbar-brand" href="dashboard.html">FOY Membership</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span id="userWelcome" class="text-white fw-bold"></span>
            <span class="divider"></span>
            <button class="btn btn-sm text-white buttonRegister" data-bs-toggle="modal"
                data-bs-target="#registerPresbyteryModal">Register Presbytery</button>
            <button class="btn btn-sm text-white buttonRegister" data-bs-toggle="modal"
                data-bs-target="#registerUserModal">Register User</button>
            <button class="btn btn-sm text-white buttonRegister" onclick="exportDatabase()">Export Data</button>
            <button class="btn btn-sm text-white buttonLogout" onclick="logout()">Logout</button>
        </div>
    </header>

    <nav class="nav flex-column p-2 gap-2">
        <!-- <ul class="nav flex-column p-2 gap-2"> -->
        <li class="nav-item">
            <a class="nav-link text-white" href="dashboard.html">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="#">Presbyteries</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="congregations.html">Congregations</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="members.html">Members</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="#">Reports</a>
        </li>
        <!-- </ul> -->
    </nav>

    <div class="main">
        <div class="mt-4 ms-3 me-3">
            <h3 class="mb-3">Presbyteries</h3>

            <div class="row" id="presbyteryList">
                <!-- Cards will load here dynamically -->
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerUserModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Register User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerUserForm">
                        <div class="mb-3">
                            <input type="text" id="userName" class="form-control" placeholder="Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" id="userEmail" class="form-control" placeholder="Email Address"
                                required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="userPassword" class="form-control" placeholder="Password"
                                required>
                        </div>
                        <div class="mb-3">
                            <select id="userRole" class="form-select mb-3" required>
                                <option value="">--Select Role--</option>
                                <option value="User">User</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <p class="error-message" id="register-error"></p>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveUserBtn" onclick="registerUserENC()">Save New
                        User</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerPresbyteryModal" tabindex="-1" data-bs-backdrop="static"
        data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Register Presbytery</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerPresbyteryForm">
                        <div class="mb-3">
                            <input type="text" id="presbyteryName" class="form-control" placeholder="Presbytery Name"
                                required />
                        </div>
                        <div class="mb-3">
                            <input type="text" id="presbyterySynod" class="form-control"
                                placeholder="Synod (If Applicable)" />
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <p class="error-message" id="presbytery-error"></p>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="registerPresbytery()">Register
                        Presbytery</button>
                </div>
            </div>
        </div>
    </div>



    <!-- Shared / Base Scripts -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/ui.js"></script>

    <!-- Authentication -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/file.js"></script>>

    <!-- Dashboard features -->
    <script src="assets/js/file.js"></script>
    <script src="assets/js/db-merge.js"></script>
    <script src="assets/js/congregation.js"></script>
    <script src="assets/js/presbytery.js"></script>

    <!-- Final initializer -->
    <script src="assets/js/app.js"></script>
    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
