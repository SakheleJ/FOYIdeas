<body>
  <div class="container">

    ```
    <div class="card mb-3 bg-dark-subtle">
      <div class="card-body file-section">
        <h5 class="card-title">Load Database</h5>

        <div class="row g-2 align-items-center">
          <div class="col-auto">
            <input id="file-input" class="form-control" type="file" accept=".foydb" />
          </div>
          <div class="col-auto">
            <button id="btn-load-db" class="btn btn-outline-primary" type="button">Load File</button>
          </div>
          <div class="col-12">
            <p id="file-status" class="small text-muted mt-2">No file loaded yet. Using localStorage.</p>
          </div>
        </div>
      </div>
    </div>
    ```

    ```
    <!-- Login Form -->
    <div class="card mb-3">
      <div class="card-body" id="login-form">
        <h5 class="card-title">Login</h5>
        <div class="row g-2 align-items-center">
          <p class="error-message" id="register-error"></p>
          <div class="col-auto">
            <input class="form-control" type="email" id="login-email" placeholder="Email Address" required />
          </div>
          <div class="col-auto">
            <input class="form-control" type="password" id="login-password" placeholder="Password" required />
          </div>
          <div class="col-auto">
            <button class="btn btn-primary" type="button" onclick="loginENC()">Login</button>
          </div>
        </div>
      </div>
    </div>

    ```
